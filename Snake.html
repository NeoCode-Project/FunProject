<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content=width=device-width, initial-scale=1.0">
    <title>Игра Змейка</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: white;
            font-family: Arial, sans-serif;
            flex-direction: column;
        }
        canvas {
            border: 5px solid #ecf0f1;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        h1 { margin-bottom: 10px; }
        .score { font-size: 24px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>Змейка</h1>
    <div class="score">Счёт: <span id="scoreVal">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <p>Используй стрелочки для управления</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");

        let score = 0;
        let gridSize = 20;
        let snake = [{x: 160, y: 160}, {x: 140, y: 160}, {x: 120, y: 160}];
        let dx = gridSize;
        let dy = 0;
        let foodX = 300;
        let foodY = 300;
        let next_dx = gridSize;
        let next_dy = 0;

        // Функция для выбора случайного положения еды
        function createFood() {
            foodX = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
            foodY = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
        }

        // Отрисовка
        function draw() {
            // Очистка поля
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Рисуем змейку
            snake.forEach((part, index) => {
                ctx.fillStyle = (index === 0) ? "#2ecc71" : "#27ae60"; // Голова светлее
                ctx.fillRect(part.x, part.y, gridSize - 2, gridSize - 2);
            });

            // Рисуем еду
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(foodX, foodY, gridSize - 2, gridSize - 2);

            // Движение головы
            const head = {x: snake[0].x + next_dx, y: snake[0].y + next_dy};
            snake[0] = head;
            
            dx = next_dx;
            dy = next_dy;

            // Проверка на столкновение с едой
            if (snake[0].x === foodX && snake[0].y === foodY) {
                score += 10;
                scoreElement.innerText = score;
                createFood();
                // Добавляем сегмент к змейке (не удаляем хвост)
                snake.push({x: snake[1].x, y: snake[1].y});
            } else {
                // Двигаемся вперед, удаляя хвост
                snake.pop();
            }

            // Проверка столкновения со стенами или самим собой
            if (
                snake[0].x < 0 || 
                snake[0].x >= canvas.width || 
                snake[0].y < 0 || 
                snake[0].y >= canvas.height || 
                snake.some((part, i) => i !== 0 && part.x === snake[0].x && part.y === snake[0].y)
            ) {
                // Рестарт игры при проигрыше
                alert("Игра окончена! Твой счёт: " + score);
                snake = [{x: 160, y: 160}, {x: 140, y: 160}, {x: 120, y: 160}];
                dx = gridSize;
                dy = 0;
                next_dx = gridSize;
                next_dy = 0;
                score = 0;
                scoreElement.innerText = score;
                createFood();
            }
        }

        // Управление
        document.addEventListener("keydown", (e) => {
            switch(e.key) {
                case "ArrowUp": if(dy !== gridSize) { next_dx = 0; next_dy = -gridSize; } break;
                case "ArrowDown": if(dy !== -gridSize) { next_dx = 0; next_dy = gridSize; } break;
                case "ArrowLeft": if(dx !== gridSize) { next_dx = -gridSize; next_dy = 0; } break;
                case "ArrowRight": if(dx !== -gridSize) { next_dx = gridSize; next_dy = 0; } break;
            }
        });

        // Игровой цикл (10 кадров в секунду — оптимально для змейки)
        setInterval(draw, 100);

    </script>
</body>
</html>
