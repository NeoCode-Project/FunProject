<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mango Clicker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">
        <div class="counter-container">
            <h1 id="countLabel">0</h1>
            <p class="subMessage">Манго собрано</p>
            <div id="comboText"></div>
        </div>

        <!-- Главное манго, на которое нужно кликать -->
        <div id="bigMango" onclick="handleMangoClick(event)">🥭</div>

        <!-- Кнопка открытия магазина -->
        <button id="shopBtn" onclick="toggleShop()">Открыть Магазин</button>
    </div>

    <!-- Окно магазина (скрыто по умолчанию) -->
    <div id="shopOverlay">
        <div class="shopWindow">
            <h2>Магазин Манго</h2>
            <div class="tabBtns">
                <button class="tabBtn active">Улучшения</button>
            </div>
            <div class="shopItems">
                <div class="shopItem">
                    <div class="emoji">⚡</div>
                    <div class="info">
                        <div class="item-name">Сила клика</div>
                        <div class="item-desc">Увеличивает доход за 1 клик.</div>
                    </div>
                    <button id="buyPower" class="buyBtn" onclick="buyUpgrade('power')">Купить (Цена: <span id="costPower">10</span>)</button>
                </div>
                <div class="shopItem">
                    <div class="emoji">✨</div>
                    <div class="info">
                        <div class="item-name">Авто-сбор</div>
                        <div class="item-desc">Манго падают сами раз в секунду.</div>
                    </div>
                    <button id="buyAuto" class="buyBtn" onclick="buyUpgrade('auto')">Купить (Цена: <span id="costAuto">50</span>)</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
