<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МАНГО 67 — ПЕРЕДОЗИРОВКА</title>
<style>
  :root{
    --hot: #ff6b00;
    --acid: #d4ff00;
    --deep: #1a0033;
    --pink: #ff2e88;
    --gold: #ffd700;
    --panel: rgba(20,0,40,.92);
  }
  :root[data-theme="ice"]{ --hot:#00d4ff; --acid:#c8ffef; --deep:#001a33; --pink:#2ecbff; --gold:#a8fff0; }
  :root[data-theme="fire"]{ --hot:#ff2200; --acid:#ffb700; --deep:#2b0000; --pink:#ff5e00; --gold:#ffd23f; }
  :root[data-theme="void"]{ --hot:#8a2be2; --acid:#e0b3ff; --deep:#05000f; --pink:#c71585; --gold:#f0e6ff; }
  *{box-sizing:border-box; user-select:none;}
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background: radial-gradient(circle at 50% 20%, #2d0a4e, var(--deep) 70%);
    font-family: 'Arial Black', Impact, sans-serif;
    touch-action: manipulation;
    transition: background .6s ease;
  }
  #app{
    position:relative; width:100%; height:100vh;
    display:flex; flex-direction:column; align-items:center;
    justify-content:flex-start; overflow:hidden;
  }
  #topBar{
    width:100%;
    display:flex; align-items:flex-start; justify-content:space-between;
    padding: 8px 10px 0 10px;
    z-index: 25;
  }
  #title{
    flex:1;
    margin-top: 6px;
    font-size: clamp(16px, 5vw, 40px);
    color: var(--acid);
    text-shadow: 0 0 10px var(--hot), 0 0 30px var(--pink), 3px 3px 0 #000;
    letter-spacing: 1px;
    text-align:center;
    transform: rotate(-2deg);
    animation: wobble 2.4s ease-in-out infinite;
  }
  @keyframes wobble{
    0%,100%{ transform: rotate(-2deg) scale(1); }
    50%{ transform: rotate(2deg) scale(1.03); }
  }
  .iconBtn{
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.2);
    color: #fff;
    width: 34px; height: 34px;
    border-radius: 50%;
    font-size: 15px;
    cursor: pointer;
    flex-shrink:0;
  }
  #rankLabel{
    color: var(--pink);
    font-size: clamp(10px, 2.6vw, 13px);
    letter-spacing: 1px;
    margin-top: 2px;
  }
  #counterWrap{ margin-top: 0px; z-index: 5; text-align:center; }
  #counter{
    font-size: clamp(36px, 11vw, 82px);
    color: var(--gold);
    text-shadow: 0 0 15px var(--hot), 4px 4px 0 #000;
    line-height: 1;
  }
  #sub{
    color: #fff; font-size: clamp(10px, 2.6vw, 14px);
    opacity: .8; margin-top: 2px; letter-spacing: 1px;
  }
  #statsRow{
    display:flex; gap: 10px; justify-content:center; flex-wrap:wrap;
    margin-top: 4px; font-size: clamp(9px, 2.2vw, 12px);
    color: var(--acid); opacity: .9;
  }
  #combo{
    font-size: clamp(12px, 3vw, 18px); color: var(--pink);
    margin-top: 2px; height: 20px;
  }
  #mangoStage{
    position:relative; flex: 1; width: 100%;
    display:flex; align-items:center; justify-content:center; min-height: 0;
  }
  #bigMango{
    font-size: clamp(74px, 22vw, 175px);
    cursor: pointer;
    filter: drop-shadow(0 0 25px rgba(255,140,0,.7));
    transition: transform .05s ease-out;
    z-index: 4;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float{
    0%,100%{ transform: translateY(0) rotate(0deg); }
    50%{ transform: translateY(-14px) rotate(4deg); }
  }
  #bigMango:active{ transform: scale(.85) rotate(-8deg); }
  .flyMango{
    position:absolute; font-size: 24px; pointer-events:none;
    z-index: 6; animation: rise 1s ease-out forwards; white-space:nowrap;
  }
  @keyframes rise{
    from{ transform: translateY(0) scale(1); opacity:1; }
    to{ transform: translateY(-140px) scale(1.6); opacity:0; }
  }
  .rainMango{
    position:absolute; top:-60px; font-size: 34px; pointer-events:none;
    z-index: 3; animation-name: fall; animation-timing-function: linear; animation-fill-mode: forwards;
  }
  @keyframes fall{
    from{ transform: translateY(0) rotate(0deg); }
    to{ transform: translateY(115vh) rotate(720deg); }
  }
  #goldenMango{
    position:absolute;
    font-size: 46px;
    cursor:pointer;
    z-index: 8;
    filter: drop-shadow(0 0 18px gold) drop-shadow(0 0 30px orange);
    animation: goldenPulse .6s ease-in-out infinite alternate, goldenFloat 2.4s ease-in-out infinite;
    display:none;
  }
  @keyframes goldenPulse{ from{ transform: scale(1); } to{ transform: scale(1.15); } }
  @keyframes goldenFloat{ 0%,100%{ margin-top:0; } 50%{ margin-top:-16px; } }
  #overdoseBanner{
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    z-index: 20; pointer-events:none; opacity: 0;
  }
  #overdoseBanner span{
    font-size: clamp(24px, 7.5vw, 76px); color: #fff;
    text-shadow: 0 0 20px var(--pink), 0 0 60px var(--hot);
    text-align:center; padding: 0 10px;
  }
  .shake{ animation: shakeAnim .4s; }
  @keyframes shakeAnim{
    0%,100%{ transform: translate(0,0); }
    20%{ transform: translate(-14px,10px) rotate(-2deg); }
    40%{ transform: translate(12px,-10px) rotate(2deg); }
    60%{ transform: translate(-10px,8px) rotate(-1deg); }
    80%{ transform: translate(10px,-6px) rotate(1deg); }
  }
  .flash{ animation: flashAnim .5s; }
  @keyframes flashAnim{ 0%{ background: #fff; } 100%{ background: transparent; } }
  #flashLayer{
    position:absolute; top:0; left:0; width:100%; height:100%;
    z-index: 15; pointer-events:none; mix-blend-mode: screen;
  }
  .confetti{
    position:absolute; top:-20px; width:8px; height:14px; z-index: 22;
    animation-name: confettiFall; animation-timing-function: linear; animation-fill-mode: forwards;
    pointer-events:none;
  }
  @keyframes confettiFall{
    from{ transform: translateY(0) rotate(0deg); opacity:1; }
    to{ transform: translateY(110vh) rotate(600deg); opacity:.2; }
  }
  #bottomBar{
    width:100%; display:flex; justify-content:center; align-items:center;
    gap: 8px; padding: 8px 10px 14px 10px; z-index: 25; flex-wrap: wrap;
  }
  .pillBtn{
    background: var(--pink); color: #fff; border: none;
    padding: 9px 14px; border-radius: 22px;
    font-size: clamp(11px, 2.8vw, 14px); font-weight: bold; cursor: pointer;
    box-shadow: 0 0 12px rgba(255,46,136,.6); letter-spacing: .5px;
  }
  .pillBtn.secondary{
    background: transparent; border: 2px solid var(--acid); color: var(--acid);
    box-shadow: none; opacity: .8;
  }
  .pillBtn.gold{ background: var(--gold); color:#1a0033; box-shadow:0 0 12px rgba(255,215,0,.6); }
  .pillBtn:active{ transform: scale(.95); }

  #shopOverlay{
    position:fixed; inset:0; background: rgba(0,0,0,.6); z-index: 50;
    display:none; align-items:flex-end; justify-content:center;
  }
  #shopOverlay.open{ display:flex; }
  #shopPanel{
    width: min(560px, 100%); max-height: 86vh; background: var(--panel);
    border-top: 3px solid var(--acid); border-radius: 18px 18px 0 0;
    padding: 14px 14px 20px 14px; overflow-y: auto; box-shadow: 0 -10px 40px rgba(0,0,0,.6);
  }
  #shopHeader{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 8px; }
  #shopHeader h2{ color: var(--gold); font-size: clamp(17px, 4.4vw, 24px); margin: 0; text-shadow: 2px 2px 0 #000; }
  #shopClose{ background: var(--hot); color:#fff; border:none; border-radius: 50%; width: 34px; height:34px; font-size:16px; cursor:pointer; }
  #shopBalance{ color: var(--acid); font-size: clamp(12px, 3vw, 15px); margin-bottom: 10px; }
  .shopItem{
    display:flex; align-items:center; gap:10px;
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.12);
    border-radius: 12px; padding: 10px; margin-bottom: 8px;
  }
  .shopItem .emoji{ font-size: 28px; width:38px; text-align:center; }
  .shopItem .info{ flex:1; min-width:0; }
  .shopItem .name{ color:#fff; font-size: clamp(12px,3vw,14px); }
  .shopItem .desc{ color: #bbb; font-size: clamp(9px,2.4vw,11px); margin-top:2px; }
  .shopItem .lvl{ color: var(--pink); font-size: clamp(9px,2.2vw,11px); margin-top:2px; }
  .buyBtn{
    background: var(--gold); color: #1a0033; border:none; padding: 8px 12px;
    border-radius: 14px; font-weight:bold; font-size: clamp(10px,2.6vw,12px);
    cursor:pointer; white-space:nowrap;
  }
  .buyBtn:disabled{ background: #555; color: #999; cursor: not-allowed; }
  #achievementsList{ margin-top: 6px; }
  .achRow{
    display:flex; align-items:center; gap:8px; padding: 6px 4px;
    color: #ddd; font-size: clamp(10px, 2.6vw, 12px); opacity: .55;
  }
  .achRow.done{ opacity: 1; color: var(--acid); }
  .tabRow{ display:flex; gap:5px; margin-bottom:10px; flex-wrap:wrap; }
  .tabBtn{
    flex:1; min-width: 70px; background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.15); color: #fff; padding: 7px;
    border-radius: 10px; font-size: clamp(10px,2.6vw,12px); cursor:pointer;
  }
  .tabBtn.active{ background: var(--acid); color: #1a0033; border-color: var(--acid); }
  .hidden{ display:none; }
  .themeSwatch{
    display:inline-flex; align-items:center; gap:6px;
    background: rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.15);
    border-radius: 10px; padding: 8px 10px; margin: 4px; cursor:pointer;
    font-size: clamp(10px,2.6vw,12px); color:#fff;
  }
  .themeSwatch.active{ outline: 2px solid var(--acid); }
  .themeDot{ width:16px; height:16px; border-radius:50%; }
  #prestigeBox{
    background: rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.15);
    border-radius: 12px; padding: 12px; margin-bottom: 10px; text-align:center;
  }
  #prestigeBox p{ color:#ddd; font-size: clamp(11px,2.8vw,13px); margin: 4px 0; }
  #toast{
    position:fixed; top: 14px; left:50%; transform: translateX(-50%);
    background: rgba(0,0,0,.85); color: var(--gold); border: 1px solid var(--gold);
    padding: 10px 16px; border-radius: 12px; font-size: clamp(11px,2.8vw,13px);
    z-index: 60; opacity:0; pointer-events:none; text-align:center; max-width: 90vw;
  }
</style>
</head>
<body>
<div id="app">
  <div id="topBar">
    <button class="iconBtn" id="soundBtn">🔊</button>
    <div>
      <div id="title">🥭 СУПЕР ПУПЕР МЕГА МАНГО 67 🥭</div>
      <div id="rankLabel" style="text-align:center;">Манго-новичок</div>
    </div>
    <button class="iconBtn" id="themeBtnTop">🎨</button>
  </div>
  <div id="counterWrap">
    <div id="counter">0</div>
    <div id="sub">манго собрано... давай, жми ещё</div>
    <div id="statsRow">
      <span id="statPerClick">💪 клик: 1</span>
      <span id="statPerSec">🌱 сек: 0</span>
      <span id="statCrit">🎯 крит: 0%</span>
      <span id="statPrestige">✨ престиж: x1.00</span>
    </div>
    <div id="combo"></div>
  </div>
  <div id="mangoStage">
    <div id="bigMango">🥭</div>
    <div id="goldenMango">🥭</div>
  </div>
  <div id="overdoseBanner"><span id="overdoseText"></span></div>
  <div id="flashLayer"></div>
  <div id="toast"></div>
  <div id="bottomBar">
    <button class="pillBtn" id="openShop">🛒 МАГАЗИН</button>
    <button class="pillBtn gold" id="openPrestige">✨ ПЕРЕРОДИТЬСЯ</button>
    <button class="pillBtn secondary" id="resetBtn">сброс</button>
  </div>
</div>

<div id="shopOverlay">
  <div id="shopPanel">
    <div id="shopHeader">
      <h2>🛒 МАНГО-МАГАЗИН</h2>
      <button id="shopClose">✕</button>
    </div>
    <div id="shopBalance">Баланс: <span id="shopBalanceVal">0</span> 🥭</div>
    <div class="tabRow">
      <button class="tabBtn active" data-tab="shop">Апгрейды</button>
      <button class="tabBtn" data-tab="ach">Достижения</button>
      <button class="tabBtn" data-tab="prestige">Престиж</button>
      <button class="tabBtn" data-tab="theme">Темы</button>
    </div>
    <div id="shopTab"></div>
    <div id="achTab" class="hidden"><div id="achievementsList"></div></div>
    <div id="prestigeTab" class="hidden">
      <div id="prestigeBox">
        <p>Переродись, чтобы обменять весь прогресс на постоянный множитель добычи манго навсегда.</p>
        <p id="prestigeInfo"></p>
        <button class="pillBtn gold" id="doPrestige">Переродиться сейчас</button>
      </div>
    </div>
    <div id="themeTab" class="hidden">
      <div id="themeList" style="display:flex; flex-wrap:wrap;"></div>
    </div>
  </div>
</div>

<script>
/* ================= STATE ================= */
let count = 0, clickPower = 1, perSec = 0, critChance = 0, lastClickTime = 0, comboCount = 0;
let rainPower = 1, totalEarned = 0, prestigeLevel = 0, soundOn = true, currentTheme = 'default';
let buffUntil = 0, buffMult = 1;

const els = id => document.getElementById(id);
const bigMango = els('bigMango'), counterEl = els('counter'), subEl = els('sub'), comboEl = els('combo');
const app = els('app'), overdoseBanner = els('overdoseBanner'), overdoseText = els('overdoseText');
const flashLayer = els('flashLayer'), statPerClick = els('statPerClick'), statPerSec = els('statPerSec');
const statCrit = els('statCrit'), statPrestige = els('statPrestige'), shopBalanceVal = els('shopBalanceVal');
const goldenMango = els('goldenMango'), toast = els('toast'), rankLabel = els('rankLabel');

const subMessages = [
  "манго собрано... давай, жми ещё","манговый сок уже течёт из ушей","ты не остановишься, да?",
  "врачи в панике","манго уровня БОГ","это уже не смешно, это МНОГО манго","67... 67... 67...",
  "передозировка неизбежна","манго повсюду","организм требует ещё"
];
function pickSub(){ subEl.textContent = subMessages[Math.floor(Math.random()*subMessages.length)]; }

/* ================= SOUND ================= */
let actx = null;
function getCtx(){ if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return actx; }
function beep(freq, dur, type, vol){
  if(!soundOn) return;
  const ctx = getCtx(); if(!ctx) return;
  try{
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.type = type||'square'; osc.frequency.value = freq;
    gain.gain.value = (vol||0.05);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + (dur||0.12));
    osc.stop(ctx.currentTime + (dur||0.12) + 0.02);
  }catch(e){}
}
els('soundBtn').addEventListener('click', ()=>{
  soundOn = !soundOn;
  els('soundBtn').textContent = soundOn ? '🔊' : '🔇';
  save();
});

/* ================= RANK ================= */
const ranks = [
  {min:0, title:'Манго-новичок'},
  {min:100, title:'Манго-любитель'},
  {min:1000, title:'Манго-мастер'},
  {min:10000, title:'Манго-легенда'},
  {min:100000, title:'Манго-бог'},
  {min:1000000, title:'МАНГОВСЕЛЕННАЯ'},
];
function currentRank(){
  let r = ranks[0];
  for(const x of ranks){ if(totalEarned >= x.min) r = x; }
  return r.title;
}

/* ================= SHOP ITEMS ================= */
const shopItems = [
  { id:'hands', emoji:'✊', name:'Сильные руки', desc:'+1 манго за клик', baseCost:15, growth:1.16, level:0, apply(){ clickPower += 1; } },
  { id:'dope', emoji:'💉', name:'Манговый допинг', desc:'+5 манго за клик', baseCost:120, growth:1.17, level:0, apply(){ clickPower += 5; } },
  { id:'glove', emoji:'🧤', name:'Манго-перчатка', desc:'+25 манго за клик', baseCost:15000, growth:1.18, level:0, apply(){ clickPower += 25; } },
  { id:'tree', emoji:'🌳', name:'Манговое дерево', desc:'+1 манго в секунду', baseCost:25, growth:1.14, level:0, apply(){ perSec += 1; } },
  { id:'garden', emoji:'🌴', name:'Манговый сад', desc:'+5 манго в секунду', baseCost:200, growth:1.15, level:0, apply(){ perSec += 5; } },
  { id:'farm', emoji:'🚜', name:'Манговая ферма', desc:'+20 манго в секунду', baseCost:1200, growth:1.16, level:0, apply(){ perSec += 20; } },
  { id:'factory', emoji:'🏭', name:'Манго-завод', desc:'+100 манго в секунду', baseCost:8000, growth:1.17, level:0, apply(){ perSec += 100; } },
  { id:'rocket', emoji:'🚀', name:'Манго-ракета', desc:'+500 манго в секунду', baseCost:60000, growth:1.19, level:0, apply(){ perSec += 500; } },
  { id:'crit', emoji:'🎯', name:'Критический сок', desc:'+5% шанс крит-клика (x5 манго)', baseCost:300, growth:1.25, level:0, maxLevel:15, apply(){ critChance = Math.min(0.75, critChance + 0.05); } },
  { id:'rain', emoji:'🌧️', name:'Манговый дождь+', desc:'Ивенты манго-дождя мощнее', baseCost:5000, growth:1.3, level:0, maxLevel:5, apply(){ rainPower += 1; } },
];
function costFor(item){ return Math.ceil(item.baseCost * Math.pow(item.growth, item.level)); }
function buyItem(item){
  const cost = costFor(item);
  const maxed = item.maxLevel && item.level >= item.maxLevel;
  if(maxed || count < cost) return;
  count -= cost; item.level++; item.apply();
  beep(660,0.08,'square',0.06);
  updateUI(); renderShop(); save();
}

/* ================= ACHIEVEMENTS ================= */
const achievements = [
  { text:'Первое манго', cond: ()=> totalEarned>=1 },
  { text:'67 манго — судьбоносное число', cond: ()=> totalEarned>=67 },
  { text:'Сотня манго', cond: ()=> totalEarned>=100 },
  { text:'Манговый шторм (250)', cond: ()=> totalEarned>=250 },
  { text:'Клиническая передозировка (500)', cond: ()=> totalEarned>=500 },
  { text:'Мангогеддон (1000)', cond: ()=> totalEarned>=1000 },
  { text:'6700 манго', cond: ()=> totalEarned>=6700 },
  { text:'Первый апгрейд куплен', cond: ()=> shopItems.some(i=>i.level>0) },
  { text:'Максимальный крит-шанс', cond: ()=> critChance>=0.75 },
  { text:'100 манго в секунду', cond: ()=> perSec>=100 },
  { text:'Поймал золотое манго', cond: ()=> goldenCaughtCount>=1 },
  { text:'Первое перерождение', cond: ()=> prestigeLevel>=1 },
  { text:'Манго-легенда достигнута', cond: ()=> totalEarned>=10000 },
  { text:'Миллион манго', cond: ()=> totalEarned>=1000000 },
];
let goldenCaughtCount = 0;

/* ================= THEMES ================= */
const themes = [
  { id:'default', name:'Классика', dot:'#ff6b00', unlock: ()=> true },
  { id:'ice', name:'Лёд', dot:'#00d4ff', unlock: ()=> totalEarned>=250 },
  { id:'fire', name:'Огонь', dot:'#ff2200', unlock: ()=> totalEarned>=1000 },
  { id:'void', name:'Пустота', dot:'#8a2be2', unlock: ()=> prestigeLevel>=1 },
];
function applyTheme(id){
  currentTheme = id;
  document.documentElement.setAttribute('data-theme', id === 'default' ? '' : id);
  save();
}

/* ================= FX ================= */
function spawnFlyMango(x, y, text){
  const m = document.createElement('div');
  m.className = 'flyMango'; m.textContent = text || '🥭';
  m.style.left = (x - 14) + 'px'; m.style.top = (y - 14) + 'px';
  app.appendChild(m); setTimeout(()=> m.remove(), 1000);
}
function spawnRain(n){
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const m = document.createElement('div');
      m.className = 'rainMango'; m.textContent = '🥭';
      m.style.left = Math.random()*100 + '%';
      const dur = 1.4 + Math.random()*1.2;
      m.style.animationDuration = dur + 's';
      m.style.fontSize = (24 + Math.random()*30) + 'px';
      app.appendChild(m); setTimeout(()=> m.remove(), dur*1000 + 100);
    }, i*40);
  }
}
function spawnConfetti(n){
  const colors = ['#ff6b00','#d4ff00','#ff2e88','#ffd700','#00d4ff'];
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random()*100 + '%';
      c.style.background = colors[Math.floor(Math.random()*colors.length)];
      const dur = 1.8 + Math.random()*1.4;
      c.style.animationDuration = dur + 's';
      app.appendChild(c); setTimeout(()=> c.remove(), dur*1000+100);
    }, i*20);
  }
}
function flashScreen(){ flashLayer.classList.remove('flash'); void flashLayer.offsetWidth; flashLayer.classList.add('flash'); }
function shakeScreen(){ app.classList.remove('shake'); void app.offsetWidth; app.classList.add('shake'); }
function showOverdose(text, big){
  overdoseText.textContent = text;
  overdoseText.style.fontSize = big ? 'clamp(26px, 8vw, 88px)' : '';
  overdoseBanner.style.transition = 'opacity .15s ease'; overdoseBanner.style.opacity = 1;
  setTimeout(()=>{ overdoseBanner.style.transition = 'opacity .8s ease'; overdoseBanner.style.opacity = 0; }, 700);
}
function showToast(msg){
  toast.textContent = msg;
  toast.style.transition = 'opacity .2s ease';
  toast.style.opacity = 1;
  setTimeout(()=>{ toast.style.transition='opacity .8s ease'; toast.style.opacity = 0; }, 2600);
}

function checkMilestones(){
  const c = totalEarned;
  if(c === 67){ showOverdose("67!!! ТЫ НАШЁЛ ЧИСЛО", true); spawnRain(67*rainPower); shakeScreen(); flashScreen(); beep(220,0.4,'sawtooth',0.08); document.title="МАНГО 67 🥭 НАЙДЕНО"; }
  else if(c % 67 === 0 && c>0){ showOverdose(c + " — ЕЩЁ ОДНО 67!", true); spawnRain(30*rainPower); shakeScreen(); flashScreen(); beep(220,0.3,'sawtooth',0.06); }
  else if(c === 100){ showOverdose("СОТНЯ МАНГО", false); spawnRain(20*rainPower); }
  else if(c === 250){ showOverdose("МАНГОВЫЙ ШТОРМ", false); spawnRain(35*rainPower); shakeScreen(); }
  else if(c === 500){ showOverdose("КЛИНИЧЕСКАЯ ПЕРЕДОЗИРОВКА МАНГО", false); spawnRain(60*rainPower); shakeScreen(); flashScreen(); }
  else if(c === 1000){ showOverdose("1000 МАНГО. МАНГОГЕДДОН.", true); spawnRain(120*rainPower); shakeScreen(); flashScreen(); spawnConfetti(60); }
  else if(c % 1000 === 0 && c>0 && c%500===0){ showOverdose(c + " МАНГО. ПРИРОДА ЗЛИТСЯ.", false); spawnRain(80*rainPower); shakeScreen(); flashScreen(); spawnConfetti(30); }
}

/* ================= GOLDEN MANGO ================= */
function scheduleGolden(){
  const delay = 18000 + Math.random()*22000;
  setTimeout(()=>{
    const stage = els('mangoStage');
    const rect = stage.getBoundingClientRect();
    const gx = 20 + Math.random()*(rect.width-80);
    const gy = 20 + Math.random()*(rect.height-80);
    goldenMango.style.left = gx + 'px';
    goldenMango.style.top = gy + 'px';
    goldenMango.style.display = 'block';
    let caught = false;
    const hideTimer = setTimeout(()=>{ if(!caught) goldenMango.style.display='none'; scheduleGolden(); }, 5500);
    goldenMango.onclick = ()=>{
      if(caught) return; caught = true;
      clearTimeout(hideTimer);
      goldenMango.style.display = 'none';
      goldenCaughtCount++;
      beep(880,0.25,'sine',0.09);
      if(Math.random() < 0.5){
        const bonus = Math.ceil(50 + totalEarned*0.1);
        count += bonus; totalEarned += bonus;
        showToast("✨ Золотое манго! +" + bonus + " манго");
      } else {
        buffMult = 3; buffUntil = Date.now() + 15000;
        showToast("✨ Золотое манго! x3 клик на 15 секунд!");
      }
      updateUI(); scheduleGolden();
    };
  }, delay);
}

/* ================= CLICK ================= */
bigMango.addEventListener('click', (e)=>{
  const now = Date.now();
  comboCount = (now - lastClickTime < 400) ? comboCount+1 : 1;
  lastClickTime = now;

  const activeBuff = now < buffUntil ? buffMult : 1;
  const prestigeMult = 1 + prestigeLevel*0.1;
  let gain = Math.max(1, Math.round(clickPower * activeBuff * prestigeMult));
  let isCrit = Math.random() < critChance;
  if(isCrit) gain *= 5;

  count += gain; totalEarned += gain;
  counterEl.textContent = Math.floor(count);
  pickSub();

  const rect = bigMango.getBoundingClientRect();
  const x = rect.left + rect.width/2 + (Math.random()*60-30);
  const y = rect.top + rect.height/2;
  spawnFlyMango(x, y, isCrit ? ('🥭 КРИТ +'+gain) : ('+'+gain));
  beep(isCrit?520:320, 0.09, isCrit?'triangle':'square', isCrit?0.07:0.04);
  if(navigator.vibrate && isCrit) navigator.vibrate(30);

  comboEl.textContent = comboCount >= 5 ? ("🔥 КОМБО x" + comboCount + " 🔥") : "";
  bigMango.style.transform = 'scale(' + (isCrit?1.3:1.15) + ') rotate(' + (Math.random()*16-8) + 'deg)';
  setTimeout(()=>{ bigMango.style.transform = ''; }, 90);

  checkMilestones();
  updateUI();
});

/* ================= AUTO INCOME ================= */
setInterval(()=>{
  if(perSec > 0){
    const prestigeMult = 1 + prestigeLevel*0.1;
    const gain = perSec * prestigeMult;
    count += gain; totalEarned += gain;
    counterEl.textContent = Math.floor(count);
    checkMilestones(); updateUI();
  }
}, 1000);
setInterval(save, 5000);

/* ================= UI ================= */
function updateUI(){
  counterEl.textContent = Math.floor(count);
  statPerClick.textContent = "💪 клик: " + clickPower + (Date.now()<buffUntil ? " (x"+buffMult+"!)" : "");
  statPerSec.textContent = "🌱 сек: " + perSec;
  statCrit.textContent = "🎯 крит: " + Math.round(critChance*100) + "%";
  statPrestige.textContent = "✨ престиж: x" + (1+prestigeLevel*0.1).toFixed(2);
  shopBalanceVal.textContent = Math.floor(count);
  rankLabel.textContent = currentRank();
}

/* ================= SHOP / TABS ================= */
const shopTab = els('shopTab'), achTab = els('achTab'), achievementsList = els('achievementsList');
const prestigeTab = els('prestigeTab'), themeTab = els('themeTab'), themeList = els('themeList');

function renderShop(){
  shopTab.innerHTML = '';
  shopItems.forEach(item=>{
    const cost = costFor(item);
    const maxed = item.maxLevel && item.level >= item.maxLevel;
    const row = document.createElement('div');
    row.className = 'shopItem';
    row.innerHTML = `
      <div class="emoji">${item.emoji}</div>
      <div class="info">
        <div class="name">${item.name}</div>
        <div class="desc">${item.desc}</div>
        <div class="lvl">Уровень: ${item.level}${item.maxLevel ? ' / '+item.maxLevel : ''}</div>
      </div>
      <button class="buyBtn" ${(count<cost||maxed) ? 'disabled':''}>${maxed ? 'МАКС' : cost + ' 🥭'}</button>
    `;
    row.querySelector('.buyBtn').addEventListener('click', ()=> buyItem(item));
    shopTab.appendChild(row);
  });
}
function renderAchievements(){
  achievementsList.innerHTML = '';
  achievements.forEach(a=>{
    const done = a.cond();
    const row = document.createElement('div');
    row.className = 'achRow' + (done ? ' done' : '');
    row.innerHTML = `<span>${done ? '✅' : '🔒'}</span><span>${a.text}</span>`;
    achievementsList.appendChild(row);
  });
}
function prestigeGain(){
  return Math.floor(Math.sqrt(totalEarned / 1000));
}
function renderPrestige(){
  const gain = prestigeGain();
  els('prestigeInfo').textContent = totalEarned < 1000
    ? "Заработай хотя бы 1000 манго за игру, чтобы переродиться."
    : `Текущий множитель: x${(1+prestigeLevel*0.1).toFixed(2)}. При перерождении получишь +${gain} уровней престижа (итого x${(1+(prestigeLevel+gain)*0.1).toFixed(2)}).`;
  els('doPrestige').disabled = gain < 1;
  els('doPrestige').style.opacity = gain < 1 ? .5 : 1;
}
function renderThemes(){
  themeList.innerHTML = '';
  themes.forEach(t=>{
    const unlocked = t.unlock();
    const sw = document.createElement('div');
    sw.className = 'themeSwatch' + (currentTheme===t.id ? ' active':'');
    sw.innerHTML = `<span class="themeDot" style="background:${t.dot}"></span> ${unlocked ? t.name : '🔒 '+t.name}`;
    if(unlocked){ sw.addEventListener('click', ()=>{ applyTheme(t.id); renderThemes(); }); }
    else { sw.style.opacity = .4; }
    themeList.appendChild(sw);
  });
}

const shopOverlay = els('shopOverlay');
function openShopOverlay(tab){
  shopOverlay.classList.add('open');
  document.querySelectorAll('.tabBtn').forEach(b=>b.classList.remove('active'));
  [shopTab, achTab, prestigeTab, themeTab].forEach(t=>t.classList.add('hidden'));
  const map = {shop: [shopTab, renderShop], ach: [achTab, renderAchievements], prestige: [prestigeTab, renderPrestige], theme: [themeTab, renderThemes]};
  const [el, renderFn] = map[tab];
  el.classList.remove('hidden');
  document.querySelector(`.tabBtn[data-tab="${tab}"]`).classList.add('active');
  renderFn();
}
els('openShop').addEventListener('click', ()=> openShopOverlay('shop'));
els('openPrestige').addEventListener('click', ()=> openShopOverlay('prestige'));
els('shopClose').addEventListener('click', ()=> shopOverlay.classList.remove('open'));
els('themeBtnTop').addEventListener('click', ()=> openShopOverlay('theme'));
shopOverlay.addEventListener('click', (e)=>{ if(e.target === shopOverlay) shopOverlay.classList.remove('open'); });
document.querySelectorAll('.tabBtn').forEach(btn=> btn.addEventListener('click', ()=> openShopOverlay(btn.dataset.tab)));
setInterval(()=>{ if(shopOverlay.classList.contains('open') && !shopTab.classList.contains('hidden')) renderShop(); }, 800);

els('doPrestige').addEventListener('click', ()=>{
  const gain = prestigeGain();
  if(gain < 1) return;
  prestigeLevel += gain;
  count = 0; clickPower = 1; perSec = 0; critChance = 0; rainPower = 1;
  shopItems.forEach(i=> i.level = 0);
  showOverdose("ПЕРЕРОЖДЕНИЕ! ✨ x" + (1+prestigeLevel*0.1).toFixed(2), true);
  spawnConfetti(80); shakeScreen(); flashScreen(); beep(1046,0.5,'sine',0.09);
  updateUI(); renderPrestige(); save();
});

/* ================= RESET ================= */
els('resetBtn').addEventListener('click', ()=>{
  if(!confirm("Точно сбросить ВСЁ (включая престиж)?")) return;
  count=0; totalEarned=0; clickPower=1; perSec=0; critChance=0; rainPower=1; comboCount=0;
  prestigeLevel=0; goldenCaughtCount=0; currentTheme='default';
  shopItems.forEach(i=> i.level = 0);
  applyTheme('default');
  comboEl.textContent = ""; subEl.textContent = subMessages[0];
  document.title = "МАНГО 67";
  updateUI(); save();
});

/* ================= SAVE / LOAD ================= */
function save(){
  try{
    const data = {
      count, clickPower, perSec, critChance, rainPower, totalEarned, prestigeLevel,
      soundOn, currentTheme, goldenCaughtCount,
      levels: shopItems.map(i=>i.level),
      ts: Date.now()
    };
    localStorage.setItem('mango67save', JSON.stringify(data));
  }catch(e){}
}
function load(){
  let data = null;
  try{ const raw = localStorage.getItem('mango67save'); if(raw) data = JSON.parse(raw); }catch(e){}
  if(!data) return;
  count = data.count||0; clickPower = data.clickPower||1; perSec = data.perSec||0;
  critChance = data.critChance||0; rainPower = data.rainPower||1; totalEarned = data.totalEarned||0;
  prestigeLevel = data.prestigeLevel||0; soundOn = data.soundOn!==false; goldenCaughtCount = data.goldenCaughtCount||0;
  if(Array.isArray(data.levels)){ data.levels.forEach((lvl,idx)=>{ if(shopItems[idx]){ shopItems[idx].level = lvl; for(let k=0;k<lvl;k++) shopItems[idx].apply(); } }); }
  if(data.currentTheme) applyTheme(data.currentTheme);
  els('soundBtn').textContent = soundOn ? '🔊' : '🔇';

  if(data.ts && perSec > 0){
    const elapsed = Math.min(2*3600, Math.max(0, (Date.now()-data.ts)/1000));
    const offline = Math.floor(elapsed * perSec * (1+prestigeLevel*0.1));
    if(offline > 0){
      count += offline; totalEarned += offline;
      setTimeout(()=> showToast("Пока тебя не было, выросло 🥭 " + offline + " манго"), 800);
    }
  }
}

/* ================= INIT ================= */
load();
updateUI();
scheduleGolden();
</script>
</body>
</html>
