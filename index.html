<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МАНГО 67 — ПЕРЕДОЗИРОВКА</title>
<style>
  :root{
    --hot: #ff6b00;
    --acid: #d4ff00;
    --deep: #1a0033;
    --pink: #ff2e88;
    --gold: #ffd700;
    --panel: rgba(20,0,40,.92);
  }
  *{box-sizing:border-box; user-select:none;}
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background: radial-gradient(circle at 50% 20%, #2d0a4e, var(--deep) 70%);
    font-family: 'Arial Black', Impact, sans-serif;
    touch-action: manipulation;
  }
  #app{
    position:relative; width:100%; height:100vh;
    display:flex; flex-direction:column; align-items:center;
    justify-content:flex-start; overflow:hidden;
  }
  #topBar{
    width:100%;
    display:flex; align-items:flex-start; justify-content:space-between;
    padding: 8px 10px 0 10px;
    z-index: 25;
  }
  #title{
    flex:1;
    margin-top: 6px;
    font-size: clamp(18px, 5.4vw, 42px);
    color: var(--acid);
    text-shadow: 0 0 10px var(--hot), 0 0 30px var(--pink), 3px 3px 0 #000;
    letter-spacing: 1px;
    text-align:center;
    transform: rotate(-2deg);
    animation: wobble 2.4s ease-in-out infinite;
  }
  @keyframes wobble{
    0%,100%{ transform: rotate(-2deg) scale(1); }
    50%{ transform: rotate(2deg) scale(1.03); }
  }
  #counterWrap{
    margin-top: 2px;
    z-index: 5;
    text-align:center;
  }
  #counter{
    font-size: clamp(40px, 12vw, 92px);
    color: var(--gold);
    text-shadow: 0 0 15px var(--hot), 4px 4px 0 #000;
    line-height: 1;
  }
  #sub{
    color: #fff;
    font-size: clamp(11px, 2.8vw, 15px);
    opacity: .8;
    margin-top: 2px;
    letter-spacing: 1px;
  }
  #statsRow{
    display:flex; gap: 14px; justify-content:center; flex-wrap:wrap;
    margin-top: 4px;
    font-size: clamp(10px, 2.4vw, 13px);
    color: var(--acid);
    opacity: .9;
  }
  #combo{
    font-size: clamp(13px, 3.2vw, 19px);
    color: var(--pink);
    margin-top: 2px;
    height: 22px;
  }
  #mangoStage{
    position:relative;
    flex: 1;
    width: 100%;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height: 0;
  }
  #bigMango{
    font-size: clamp(80px, 24vw, 190px);
    cursor: pointer;
    filter: drop-shadow(0 0 25px rgba(255,140,0,.7));
    transition: transform .05s ease-out;
    z-index: 4;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float{
    0%,100%{ transform: translateY(0) rotate(0deg); }
    50%{ transform: translateY(-14px) rotate(4deg); }
  }
  #bigMango:active{ transform: scale(.85) rotate(-8deg); }
  .flyMango{
    position:absolute;
    font-size: 26px;
    pointer-events:none;
    z-index: 6;
    animation: rise 1s ease-out forwards;
    white-space: nowrap;
  }
  @keyframes rise{
    from{ transform: translateY(0) scale(1); opacity:1; }
    to{ transform: translateY(-140px) scale(1.6); opacity:0; }
  }
  .rainMango{
    position:absolute;
    top:-60px;
    font-size: 34px;
    pointer-events:none;
    z-index: 3;
    animation-name: fall;
    animation-timing-function: linear;
    animation-fill-mode: forwards;
  }
  @keyframes fall{
    from{ transform: translateY(0) rotate(0deg); }
    to{ transform: translateY(115vh) rotate(720deg); }
  }
  #overdoseBanner{
    position:absolute;
    top:0; left:0; width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    z-index: 20;
    pointer-events:none;
    opacity: 0;
  }
  #overdoseBanner span{
    font-size: clamp(28px, 8.5vw, 84px);
    color: #fff;
    text-shadow: 0 0 20px var(--pink), 0 0 60px var(--hot);
    text-align:center;
    padding: 0 10px;
  }
  .shake{ animation: shakeAnim .4s; }
  @keyframes shakeAnim{
    0%,100%{ transform: translate(0,0); }
    20%{ transform: translate(-14px,10px) rotate(-2deg); }
    40%{ transform: translate(12px,-10px) rotate(2deg); }
    60%{ transform: translate(-10px,8px) rotate(-1deg); }
    80%{ transform: translate(10px,-6px) rotate(1deg); }
  }
  .flash{ animation: flashAnim .5s; }
  @keyframes flashAnim{
    0%{ background: #fff; }
    100%{ background: transparent; }
  }
  #flashLayer{
    position:absolute; top:0; left:0; width:100%; height:100%;
    z-index: 15; pointer-events:none; mix-blend-mode: screen;
  }
  #bottomBar{
    width:100%;
    display:flex; justify-content:center; align-items:center;
    gap: 10px;
    padding: 10px 10px 16px 10px;
    z-index: 25;
  }
  .pillBtn{
    background: var(--pink);
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 24px;
    font-size: clamp(12px, 3vw, 15px);
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 12px rgba(255,46,136,.6);
    letter-spacing: .5px;
  }
  .pillBtn.secondary{
    background: transparent;
    border: 2px solid var(--acid);
    color: var(--acid);
    box-shadow: none;
    opacity: .8;
  }
  .pillBtn:active{ transform: scale(.95); }

  #shopOverlay{
    position:fixed; inset:0;
    background: rgba(0,0,0,.6);
    z-index: 50;
    display:none;
    align-items:flex-end;
    justify-content:center;
  }
  #shopOverlay.open{ display:flex; }
  #shopPanel{
    width: min(560px, 100%);
    max-height: 82vh;
    background: var(--panel);
    border-top: 3px solid var(--acid);
    border-radius: 18px 18px 0 0;
    padding: 14px 14px 20px 14px;
    overflow-y: auto;
    box-shadow: 0 -10px 40px rgba(0,0,0,.6);
  }
  #shopHeader{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 8px;
  }
  #shopHeader h2{
    color: var(--gold);
    font-size: clamp(18px, 4.6vw, 26px);
    margin: 0;
    text-shadow: 2px 2px 0 #000;
  }
  #shopClose{
    background: var(--hot);
    color:#fff; border:none; border-radius: 50%;
    width: 34px; height:34px; font-size:16px; cursor:pointer;
  }
  #shopBalance{
    color: var(--acid);
    font-size: clamp(13px, 3.2vw, 16px);
    margin-bottom: 10px;
  }
  .shopItem{
    display:flex; align-items:center; gap:10px;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 12px;
    padding: 10px;
    margin-bottom: 8px;
  }
  .shopItem .emoji{ font-size: 30px; width:40px; text-align:center; }
  .shopItem .info{ flex:1; min-width:0; }
  .shopItem .name{ color:#fff; font-size: clamp(13px,3.2vw,15px); }
  .shopItem .desc{ color: #bbb; font-size: clamp(10px,2.6vw,12px); margin-top:2px; }
  .shopItem .lvl{ color: var(--pink); font-size: clamp(10px,2.4vw,12px); margin-top:2px; }
  .buyBtn{
    background: var(--gold);
    color: #1a0033;
    border:none;
    padding: 8px 12px;
    border-radius: 14px;
    font-weight:bold;
    font-size: clamp(11px,2.8vw,13px);
    cursor:pointer;
    white-space:nowrap;
  }
  .buyBtn:disabled{
    background: #555;
    color: #999;
    cursor: not-allowed;
  }
  #achievementsList{ margin-top: 6px; }
  .achRow{
    display:flex; align-items:center; gap:8px;
    padding: 6px 4px;
    color: #ddd;
    font-size: clamp(11px, 2.8vw, 13px);
    opacity: .55;
  }
  .achRow.done{ opacity: 1; color: var(--acid); }
  .tabRow{ display:flex; gap:6px; margin-bottom:10px; }
  .tabBtn{
    flex:1;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.15);
    color: #fff;
    padding: 7px;
    border-radius: 10px;
    font-size: clamp(11px,2.8vw,13px);
    cursor:pointer;
  }
  .tabBtn.active{
    background: var(--acid);
    color: #1a0033;
    border-color: var(--acid);
  }
  .hidden{ display:none; }
</style>
</head>
<body>
<div id="app">
  <div id="topBar">
    <div id="title">🥭 СУПЕР ПУПЕР МЕГА МАНГО 67 🥭</div>
  </div>
  <div id="counterWrap">
    <div id="counter">0</div>
    <div id="sub">манго собрано... давай, жми ещё</div>
    <div id="statsRow">
      <span id="statPerClick">💪 за клик: 1</span>
      <span id="statPerSec">🌱 в секунду: 0</span>
      <span id="statCrit">🎯 крит: 0%</span>
    </div>
    <div id="combo"></div>
  </div>
  <div id="mangoStage">
    <div id="bigMango">🥭</div>
  </div>
  <div id="overdoseBanner"><span id="overdoseText"></span></div>
  <div id="flashLayer"></div>
  <div id="bottomBar">
    <button class="pillBtn" id="openShop">🛒 МАГАЗИН</button>
    <button class="pillBtn secondary" id="resetBtn">сброс</button>
  </div>
</div>

<div id="shopOverlay">
  <div id="shopPanel">
    <div id="shopHeader">
      <h2>🛒 МАНГО-МАГАЗИН</h2>
      <button id="shopClose">✕</button>
    </div>
    <div id="shopBalance">Баланс: <span id="shopBalanceVal">0</span> 🥭</div>
    <div class="tabRow">
      <button class="tabBtn active" data-tab="shop">Апгрейды</button>
      <button class="tabBtn" data-tab="ach">Достижения</button>
    </div>
    <div id="shopTab"></div>
    <div id="achTab" class="hidden">
      <div id="achievementsList"></div>
    </div>
  </div>
</div>

<script>
let count = 0;
let clickPower = 1;
let perSec = 0;
let critChance = 0;
let lastClickTime = 0;
let comboCount = 0;
let rainPower = 1;
let totalEarned = 0;

const bigMango = document.getElementById('bigMango');
const counterEl = document.getElementById('counter');
const subEl = document.getElementById('sub');
const comboEl = document.getElementById('combo');
const app = document.getElementById('app');
const overdoseBanner = document.getElementById('overdoseBanner');
const overdoseText = document.getElementById('overdoseText');
const flashLayer = document.getElementById('flashLayer');
const statPerClick = document.getElementById('statPerClick');
const statPerSec = document.getElementById('statPerSec');
const statCrit = document.getElementById('statCrit');
const shopBalanceVal = document.getElementById('shopBalanceVal');

const subMessages = [
  "манго собрано... давай, жми ещё",
  "манговый сок уже течёт из ушей",
  "ты не остановишься, да?",
  "врачи в панике",
  "манго уровня БОГ",
  "это уже не смешно, это МНОГО манго",
  "67... 67... 67...",
  "передозировка неизбежна",
];
function pickSub(){ subEl.textContent = subMessages[Math.floor(Math.random()*subMessages.length)]; }

const shopItems = [
  { id:'hands', emoji:'✊', name:'Сильные руки', desc:'+1 манго за клик', baseCost:15, growth:1.16, level:0, apply(){ clickPower += 1; } },
  { id:'dope', emoji:'💉', name:'Манговый допинг', desc:'+5 манго за клик', baseCost:120, growth:1.17, level:0, apply(){ clickPower += 5; } },
  { id:'tree', emoji:'🌳', name:'Манговое дерево', desc:'+1 манго в секунду', baseCost:25, growth:1.14, level:0, apply(){ perSec += 1; } },
  { id:'garden', emoji:'🌴', name:'Манговый сад', desc:'+5 манго в секунду', baseCost:200, growth:1.15, level:0, apply(){ perSec += 5; } },
  { id:'farm', emoji:'🚜', name:'Манговая ферма', desc:'+20 манго в секунду', baseCost:1200, growth:1.16, level:0, apply(){ perSec += 20; } },
  { id:'factory', emoji:'🏭', name:'Манго-завод', desc:'+100 манго в секунду', baseCost:8000, growth:1.17, level:0, apply(){ perSec += 100; } },
  { id:'crit', emoji:'🎯', name:'Критический сок', desc:'+5% шанс крит-клика (x5 манго)', baseCost:300, growth:1.25, level:0, maxLevel:15, apply(){ critChance = Math.min(0.75, critChance + 0.05); } },
  { id:'rain', emoji:'🌧️', name:'Манговый дождь+', desc:'Ивенты манго-дождя мощнее', baseCost:5000, growth:1.3, level:0, maxLevel:5, apply(){ rainPower += 1; } },
];

function costFor(item){ return Math.ceil(item.baseCost * Math.pow(item.growth, item.level)); }

function buyItem(item){
  const cost = costFor(item);
  const maxed = item.maxLevel && item.level >= item.maxLevel;
  if(maxed || count < cost) return;
  count -= cost;
  item.level++;
  item.apply();
  updateUI();
  renderShop();
}

const achievements = [
  { id:'a1', text:'Первое манго', cond: ()=> totalEarned>=1 },
  { id:'a2', text:'67 манго — судьбоносное число', cond: ()=> totalEarned>=67 },
  { id:'a3', text:'Сотня манго', cond: ()=> totalEarned>=100 },
  { id:'a4', text:'Манговый шторм (250)', cond: ()=> totalEarned>=250 },
  { id:'a5', text:'Клиническая передозировка (500)', cond: ()=> totalEarned>=500 },
  { id:'a6', text:'Мангогеддон (1000)', cond: ()=> totalEarned>=1000 },
  { id:'a7', text:'6700 манго', cond: ()=> totalEarned>=6700 },
  { id:'a8', text:'Первый апгрейд куплен', cond: ()=> shopItems.some(i=>i.level>0) },
  { id:'a9', text:'Максимальный крит-шанс', cond: ()=> critChance>=0.75 },
  { id:'a10', text:'100 манго в секунду', cond: ()=> perSec>=100 },
];

function spawnFlyMango(x, y, text){
  const m = document.createElement('div');
  m.className = 'flyMango';
  m.textContent = text || '🥭';
  m.style.left = (x - 14) + 'px';
  m.style.top = (y - 14) + 'px';
  app.appendChild(m);
  setTimeout(()=> m.remove(), 1000);
}
function spawnRain(n){
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const m = document.createElement('div');
      m.className = 'rainMango';
      m.textContent = '🥭';
      m.style.left = Math.random()*100 + '%';
      const dur = 1.4 + Math.random()*1.2;
      m.style.animationDuration = dur + 's';
      m.style.fontSize = (24 + Math.random()*30) + 'px';
      app.appendChild(m);
      setTimeout(()=> m.remove(), dur*1000 + 100);
    }, i*40);
  }
}
function flashScreen(){ flashLayer.classList.remove('flash'); void flashLayer.offsetWidth; flashLayer.classList.add('flash'); }
function shakeScreen(){ app.classList.remove('shake'); void app.offsetWidth; app.classList.add('shake'); }
function showOverdose(text, big){
  overdoseText.textContent = text;
  overdoseText.style.fontSize = big ? 'clamp(30px, 9vw, 96px)' : '';
  overdoseBanner.style.transition = 'opacity .15s ease';
  overdoseBanner.style.opacity = 1;
  setTimeout(()=>{ overdoseBanner.style.transition = 'opacity .8s ease'; overdoseBanner.style.opacity = 0; }, 700);
}
function checkMilestones(){
  const c = totalEarned;
  if(c === 67){ showOverdose("67!!! ТЫ НАШЁЛ ЧИСЛО", true); spawnRain(67*rainPower); shakeScreen(); flashScreen(); document.title="МАНГО 67 🥭 НАЙДЕНО"; }
  else if(c % 67 === 0 && c>0){ showOverdose(c + " — ЕЩЁ ОДНО 67!", true); spawnRain(30*rainPower); shakeScreen(); flashScreen(); }
  else if(c === 100){ showOverdose("СОТНЯ МАНГО", false); spawnRain(20*rainPower); }
  else if(c === 250){ showOverdose("МАНГОВЫЙ ШТОРМ", false); spawnRain(35*rainPower); shakeScreen(); }
  else if(c === 500){ showOverdose("КЛИНИЧЕСКАЯ ПЕРЕДОЗИРОВКА МАНГО", false); spawnRain(60*rainPower); shakeScreen(); flashScreen(); }
  else if(c === 1000){ showOverdose("1000 МАНГО. МАНГОГЕДДОН.", true); spawnRain(120*rainPower); shakeScreen(); flashScreen(); }
  else if(c % 500 === 0 && c>0){ showOverdose(c + " МАНГО. ПРИРОДА ЗЛИТСЯ.", false); spawnRain(80*rainPower); shakeScreen(); flashScreen(); }
}

bigMango.addEventListener('click', (e)=>{
  const now = Date.now();
  comboCount = (now - lastClickTime < 400) ? comboCount+1 : 1;
  lastClickTime = now;

  let gain = clickPower;
  let isCrit = Math.random() < critChance;
  if(isCrit) gain *= 5;

  count += gain;
  totalEarned += gain;
  counterEl.textContent = Math.floor(count);
  pickSub();

  const rect = bigMango.getBoundingClientRect();
  const x = rect.left + rect.width/2 + (Math.random()*60-30);
  const y = rect.top + rect.height/2;
  spawnFlyMango(x, y, isCrit ? ('🥭 КРИТ +'+gain) : ('+'+gain));

  comboEl.textContent = comboCount >= 5 ? ("🔥 КОМБО x" + comboCount + " 🔥") : "";

  bigMango.style.transform = 'scale(' + (isCrit?1.3:1.15) + ') rotate(' + (Math.random()*16-8) + 'deg)';
  setTimeout(()=>{ bigMango.style.transform = ''; }, 90);

  checkMilestones();
  updateUI();
});

setInterval(()=>{
  if(perSec > 0){
    count += perSec;
    totalEarned += perSec;
    counterEl.textContent = Math.floor(count);
    checkMilestones();
    updateUI();
  }
}, 1000);

function updateUI(){
  counterEl.textContent = Math.floor(count);
  statPerClick.textContent = "💪 за клик: " + clickPower;
  statPerSec.textContent = "🌱 в секунду: " + perSec;
  statCrit.textContent = "🎯 крит: " + Math.round(critChance*100) + "%";
  shopBalanceVal.textContent = Math.floor(count);
}

const shopTab = document.getElementById('shopTab');
const achTab = document.getElementById('achTab');
const achievementsList = document.getElementById('achievementsList');

function renderShop(){
  shopTab.innerHTML = '';
  shopItems.forEach(item=>{
    const cost = costFor(item);
    const maxed = item.maxLevel && item.level >= item.maxLevel;
    const row = document.createElement('div');
    row.className = 'shopItem';
    row.innerHTML = `
      <div class="emoji">${item.emoji}</div>
      <div class="info">
        <div class="name">${item.name}</div>
        <div class="desc">${item.desc}</div>
        <div class="lvl">Уровень: ${item.level}${item.maxLevel ? ' / '+item.maxLevel : ''}</div>
      </div>
      <button class="buyBtn" ${(count<cost||maxed) ? 'disabled':''}>${maxed ? 'МАКС' : cost + ' 🥭'}</button>
    `;
    row.querySelector('.buyBtn').addEventListener('click', ()=> buyItem(item));
    shopTab.appendChild(row);
  });
}

function renderAchievements(){
  achievementsList.innerHTML = '';
  achievements.forEach(a=>{
    const done = a.cond();
    const row = document.createElement('div');
    row.className = 'achRow' + (done ? ' done' : '');
    row.innerHTML = `<span>${done ? '✅' : '🔒'}</span><span>${a.text}</span>`;
    achievementsList.appendChild(row);
  });
}

const shopOverlay = document.getElementById('shopOverlay');
document.getElementById('openShop').addEventListener('click', ()=>{
  shopOverlay.classList.add('open');
  renderShop();
  renderAchievements();
});
document.getElementById('shopClose').addEventListener('click', ()=> shopOverlay.classList.remove('open'));
shopOverlay.addEventListener('click', (e)=>{ if(e.target === shopOverlay) shopOverlay.classList.remove('open'); });

document.querySelectorAll('.tabBtn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tabBtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if(btn.dataset.tab === 'shop'){
      shopTab.classList.remove('hidden'); achTab.classList.add('hidden');
      renderShop();
    } else {
      shopTab.classList.add('hidden'); achTab.classList.remove('hidden');
      renderAchievements();
    }
  });
});

setInterval(()=>{ if(shopOverlay.classList.contains('open')) renderShop(); }, 800);

document.getElementById('resetBtn').addEventListener('click', ()=>{
  count = 0; totalEarned = 0; clickPower = 1; perSec = 0; critChance = 0; rainPower = 1; comboCount = 0;
  shopItems.forEach(i=> i.level = 0);
  comboEl.textContent = "";
  subEl.textContent = subMessages[0];
  document.title = "МАНГО 67";
  updateUI();
});

updateUI();
</script>
</body>
</html>
